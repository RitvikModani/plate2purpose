Food Waste Master Challenge 🚀

<div class="top">

<div>
Question <span id="number"></span>/10
</div>

Next ➜

</button>


</div>

</div>






<script>



let questions=[
{
q:"Roughly how much of all food produced worldwide is wasted every year?",
o:["About 5%","About one-third","About 60%","Almost none"],
a:1
},
{
q:"Where does most food waste in a school cafeteria usually come from?",
o:["Students stealing food","Cooking more than the real headcount","Broken refrigerators","Packaging"],
a:1
},
{
q:"A kitchen knows 412 students are present and cooks 398 meals (some opt out). What is this called?",
o:["Guesswork","Attendance-based meal planning","Overproduction","Rationing"],
a:1
},
{
q:"Wasted food that rots in landfills mainly releases which greenhouse gas?",
o:["Oxygen","Methane","Helium","Nitrogen"],
a:1
},
{
q:"Which UN Sustainable Development Goal targets responsible consumption and production?",
o:["SDG 3","SDG 7","SDG 12","SDG 17"],
a:2
},
{
q:"Tuesday's dal keeps coming back uneaten. What is the smartest first step?",
o:["Cook more dal","Check feedback data and adjust the recipe or menu","Remove lunch on Tuesdays","Ignore it"],
a:1
},
{
q:"What is the best use of safe, untouched surplus food at closing time?",
o:["Throw it away","Donate it or redistribute it quickly","Hide it","Leave it out overnight"],
a:1
},
{
q:"Tracking waste per dish per day helps a kitchen:",
o:["Spot patterns and cook smarter tomorrow","Spend more money","Cook randomly","Impress nobody"],
a:0
},
{
q:"Which of these saves the MOST food in a cafeteria?",
o:["Prettier posters","Cooking to a live headcount instead of a guess","Bigger plates","Louder music"],
a:1
},
{
q:"One mid-size school cafeteria cutting waste 40% can save roughly how much per year?",
o:["Nothing","A few rupees","Around ₹1,20,000","Only time"],
a:2
}
];



let current=0;

let score=0;

let streak=0;

let timer;

let seconds=15;



function load(){


clearInterval(timer);

seconds=15;

document.getElementById("time").innerHTML=seconds;


timer=setInterval(()=>{


seconds--;

document.getElementById("time").innerHTML=seconds;


if(seconds==0){

next();

}


},1000);




let q=questions[current];


document.getElementById("number").innerHTML=current+1;


document.getElementById("question").innerHTML=q.q;


let html="";


q.o.forEach((x,i)=>{


html+=`

<div class="option" onclick="answer(${i},this)">

${x}

</div>


`;

});


document.getElementById("options").innerHTML=html;


document.getElementById("bar").style.width=
(current/questions.length)*100+"%";


}





function answer(i,el){


clearInterval(timer);


let correct=questions[current].a;


document.querySelectorAll(".option")
.forEach(x=>x.style.pointerEvents="none");



if(i==correct){


el.classList.add("correct");

score++;

streak++;

}


else{


el.classList.add("wrong");

document.querySelectorAll(".option")[correct]
.classList.add("correct");

streak=0;


}



document.getElementById("streak").innerHTML=streak;



}





function next(){


current++;


if(current<questions.length)

load();


else finish();


}





function finish(){


document.getElementById("game").style.display="none";


let rank;


if(score==10)
rank="🏆 Zero-Waste Genius";

else if(score>=7)
rank="🔥 Kitchen Hero";

else
rank="📚 Keep Learning";


document.getElementById("result").style.display="block";


document.getElementById("result").innerHTML=

`
🎉 Quiz Finished!

<br><br>

Score: ${score}/10

<br><br>

${rank}

`;

}



load();


</script>
