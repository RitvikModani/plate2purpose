<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 | Page Not Found</title>
    <meta name="description" content="Page not found, Plate2Purpose, reducing food waste one plate at a time." />

    <!-- Favicon (absolute paths: this page is served at any unmatched URL) -->
    <link rel="icon" href="/images/recycle-sign.png" type="image/png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link href="/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/bootstrap-icons.css" rel="stylesheet" />
    <link href="/css/p2p.css" rel="stylesheet" />

    <style>
      .p2p-404-hero {
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        display: flex;
        align-items: center;
        background: var(--p2p-grad-dark);
        color: var(--p2p-text-inverse);
        overflow: hidden;
        padding: 110px 0 70px;
        text-align: center;
      }
      .p2p-404-code {
        font-family: var(--p2p-font-display);
        font-weight: 700;
        font-size: clamp(120px, 26vw, 260px);
        line-height: 0.9;
        letter-spacing: -0.06em;
        background: var(--p2p-grad-brand);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: p2pGradShift 6s ease infinite;
        user-select: none;
      }
      .p2p-404-title {
        font-size: clamp(26px, 4vw, 40px);
        color: #fff;
        margin: 18px 0 14px;
      }
      .p2p-404-foot {
        margin-top: 44px;
        font-size: 13px;
        color: var(--p2p-text-inverse-soft);
        opacity: 0.75;
      }
    </style>
    <link rel="icon" type="image/svg+xml" href="images/p2p-mark.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap" rel="stylesheet" />
</head>

  <body class="p2p">
    <!-- Preloader -->
    <div class="p2p-preloader">
      <div class="ring"></div>
      <div class="word">Plate2Purpose</div>
    </div>

    <!-- Navbar (brand only) -->
    <nav class="navbar navbar-expand-lg p2p-nav">
      <div class="container">
        <a href="/" class="navbar-brand">
          <span class="p2p-logo-mark" style="background:none; box-shadow:none; width:40px; height:40px;">
            <img src="images/p2p-mark.svg" width="40" height="40" alt="" style="display:block;" />
          </span>
          Plate2Purpose<sup style="font-size:10px; opacity:.5; margin-left:2px;">™</sup>
        </a>
      </div>
    </nav>

    <!-- 404 -->
    <main class="p2p-404-hero">
      <div class="p2p-aurora"><span></span><span></span><span></span></div>
      <div class="p2p-grid-overlay"></div>

      <div class="container position-relative">
        <div class="p2p-404-code" data-reveal="zoom" aria-hidden="true">404</div>

        <h1 class="p2p-404-title" data-split>This plate is empty.</h1>

        <p class="p2p-lead mx-auto" data-reveal="up" style="--reveal-delay:.4s;">
          The page you're looking for was either finished, composted, or never
          served. Around here, nothing goes to waste, except this URL.
        </p>

        <div class="d-flex justify-content-center flex-wrap gap-3 mt-4" data-reveal="up" style="--reveal-delay:.55s;">
          <a href="/" class="p2p-btn p2p-btn--lg">
            <i class="bi bi-house-door"></i> Return home
          </a>
        </div>

        <div class="p2p-404-foot" data-reveal="up" style="--reveal-delay:.7s;">
          © 2026 Plate2Purpose™ | Reducing Waste, One Plate at a Time
        </div>
      </div>
    </main>

    <!-- JS -->
    <script src="/js/p2p.js"></script>
  </body>
</html>
