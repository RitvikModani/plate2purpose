<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="pRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="0.6" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#0b6b3a"/>
    </linearGradient>
    <linearGradient id="pLeaf" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
  </defs>

  <!-- plate rim: broken ring, gap at top-right where the leaf sprouts -->
  <circle cx="32" cy="36" r="21" fill="none" stroke="url(#pRing)" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="110 22"
          transform="rotate(-58 32 36)"/>

  <!-- plate well (inner ring) -->
  <circle cx="32" cy="36" r="11.5" fill="none" stroke="url(#pRing)" stroke-width="2.6" opacity="0.5"/>

  <!-- stem: rim end curls upward into the leaf -->
  <path d="M45.5 20.5 Q48.5 15 50 9.5" fill="none" stroke="url(#pRing)" stroke-width="3.4" stroke-linecap="round"/>

  <!-- leaf -->
  <path d="M50 9.5 C58 10.5 62.5 16 61.5 24.5 C53 23.5 48.8 18 50 9.5 Z" fill="url(#pLeaf)"/>
  <path d="M51.5 12.5 Q56 17 59.5 21.5" fill="none" stroke="#0b6b3a" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>
</svg>
