<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plate2Purpose | Under Maintenance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fff5f0, #ffe3d6);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    background: white;
    padding: 50px 40px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    max-width: 500px;
    width: 90%;
}

.logo-img {
    width: 220px;
    margin-bottom: 25px;
}

h1 {
    font-size: 26px;
    margin-bottom: 15px;
    color: #333;
}

p {
    color: #666;
    font-size: 15px;
    margin-bottom: 25px;
}

.loader {
    width: 50px;
    height: 50px;
    border: 5px solid #ffe3d6;
    border-top: 5px solid #ff7a45;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.footer {
    font-size: 13px;
    color: #999;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

    <!-- Logo Image -->
    <img src="/images/plate2purposename.png" alt="Plate2Purpose Logo" class="logo-img">

    <div class="loader"></div>

    <h1>We're Improving Things!</h1>
    <p>
        Our team is currently upgrading the system to reduce food wastage
        even more efficiently. Please check back soon.
    </p>

    <div class="footer">
        © 2026 Plate2Purpose™ | Reducing Waste, One Plate at a Time
    </div>
</div>

</body>
</html>
