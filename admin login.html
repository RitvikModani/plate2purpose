<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plate2Purpose - Admin Login</title>
    <link rel="icon" type="image/svg+xml" href="images/p2p-mark.svg" />
    <link rel="icon" href="images/recycle-sign.png" type="image/png" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background-color: #f7f5ee;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .login-box {
        background: white;
        padding: 2.5rem;
        border-radius: 18px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 420px;
        text-align: center;
      }

      .brand {
        font-family: "Space Grotesk", cursive;
        font-size: 40px;
        font-weight: 700;
        margin-bottom: 1rem;
      }
      .brand span {
        color: #0b6b3a;
      }

      h5 {
        color: #0b6b3a;
        margin-bottom: 2rem;
        font-weight: 600;
      }

      /* Google Button - border style */
      .btn-google {
        background: transparent;
        color: #444;
        border: 2px solid #db4437;
        padding: 0.9rem;
        font-weight: 600;
        border-radius: 12px;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s ease;
      }

      .btn-google:hover {
        background-color: #db4437;
        color: white;
      }

      .btn-google img {
        width: 22px;
        height: 22px;
      }
    </style>
    <link rel="stylesheet" href="css/p2p-skin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap" rel="stylesheet" />
  <link href="css/p2p.css" rel="stylesheet" />
</head>
  <body class="p2p">
    <div class="login-box">
      <div class="brand"><span>Plate2</span>♻️<span>Purpose</span><span style="font-family:Arial, sans-serif; font-size:0.5em; font-weight:300; vertical-align:super; color:#b8b8b8;">™</span></div>
      <h5>Admin Login</h5>

      <button class="btn-google" onclick="loginWithGoogle()">
        <img
          src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
          alt="Google logo"
        />

        Continue with Google
      </button>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="credentials.js"></script>
    <script>
      const client = supabase.createClient(
        "https://wckmybwpastxcxieatcp.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indja215YndwYXN0eGN4aWVhdGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTgyNzAsImV4cCI6MjA5MzE5NDI3MH0.G95zAydPQH3WQxMHlDRjUTIMHbeu7bRODAJQN2mMNCk"
      );
    
      async function loginWithGoogle() {
        const { data, error } = await client.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: window.location.origin + "/admin-check.html",
          },
        });
    
        if (error) {
          alert("Login failed: " + error.message);
        }
      }
    </script>
  </body>
</html>
