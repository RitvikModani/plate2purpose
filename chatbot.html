<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plate2Purpose AI</title>

<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet" href="bot.css">

  <link rel="stylesheet" href="css/p2p-skin.css" />
  <link rel="icon" type="image/svg+xml" href="images/p2p-mark.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap" rel="stylesheet" />
  <link href="css/p2p.css" rel="stylesheet" />
</head>

<body class="p2p">

<div class="app">

    <!-- SIDEBAR -->

    <aside
    class="sidebar"
    id="sidebar">

        <div class="sidebar-header">

            <img
            src="images/p2p-mark.svg" style="filter:brightness(0) invert(1); width:60px; height:60px;"
            class="logo">

            

        </div>

        <button
        class="new-chat-btn"
        onclick="newChat()">

            <i class="bi bi-plus-lg"></i>

            New Chat

        </button>

        <input
        id="chatSearch"
        class="chat-search"
        placeholder="Search chats...">

        <div
        id="chatList"
        class="chat-list">
        </div>

    </aside>

    <!-- CHAT AREA -->

    <main class="chat-container">

        <div class="chat-header">

            <div class="left-header">

                <button
                id="toggleSidebar"
                class="icon-btn">

                    <i class="bi bi-list"></i>

                </button>

                <div class="brand">

                    <img
                    src="images/p2p-mark.svg" style="filter:brightness(0) invert(1); width:60px; height:60px;"
                    class="header-logo">

                   

                </div>

            </div>

            <div class="header-actions">

                <button
                onclick="clearCurrentChat()"
                class="icon-btn">

                    <i class="bi bi-trash"></i>

                </button>

            </div>

        </div>

        <div
        id="messages"
        class="messages">
        </div>

        <div class="input-area">

            <textarea id="prompt" placeholder="Ask about Plate2Purpose..."></textarea>

            <button
            onclick="sendMessage()"
            class="send-btn">

                <i class="bi bi-send-fill"></i>

            </button>

        </div>

    </main>

</div>

<script src="bot.js"></script>

</body>
</html>
