<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plate2Purpose - Account Confirmed</title>
    <link rel="icon" type="image/svg+xml" href="images/p2p-mark.svg" />
    <link rel="icon" href="images/recycle-sign.png" type="image/png" />
    <meta name="description" content="Your Plate2Purpose account has been verified successfully." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/bootstrap-icons.css" rel="stylesheet" />
    <link href="css/p2p.css" rel="stylesheet" />

    <style>
      .p2p-auth-wrap {
        min-height: 100vh;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        padding: 40px 18px;
      }
      .p2p-auth-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: var(--p2p-font-display);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: -0.02em;
        color: var(--p2p-text);
        text-decoration: none;
      }
      .p2p-auth-brand:hover { color: var(--p2p-green); }

      .success-container {
        width: 100%;
        max-width: 440px;
        text-align: center;
      }

      /* Circle */
      .checkmark-circle {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(22, 163, 74, 0.1);
        border: 4px solid var(--p2p-emerald);
        margin: 0 auto 24px;
        position: relative;
        box-shadow: 0 0 0 10px rgba(16, 185, 129, 0.07);
      }

      /* Animated Check */
      .checkmark {
        stroke: var(--p2p-green);
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        animation: draw 0.8s 0.5s forwards ease-in-out;
      }

      @keyframes draw {
        to {
          stroke-dashoffset: 0;
        }
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap" rel="stylesheet" />
</head>

  <body class="p2p">
    <!-- Preloader -->
    <div class="p2p-preloader">
      <div class="ring"></div>
      <div class="word">Plate2Purpose</div>
    </div>

    <div class="p2p-auth-wrap">
      <a href="index" class="p2p-auth-brand" data-reveal="down">
        <span class="p2p-logo-mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3a9 9 0 1 0 9 9" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <path d="M21 5c-4 .5-6.5 2-8.5 5.5" stroke="#d9f99d" stroke-width="2" stroke-linecap="round"/>
            <path d="M21 5c-.2 2.2-1 3.8-2.6 5" stroke="#d9f99d" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        Plate2Purpose<sup style="font-size:10px; opacity:.5; margin-left:2px;">™</sup>
      </a>

      <div class="p2p-form-card success-container" data-reveal="zoom">
        <div class="checkmark-circle">
          <svg viewBox="0 0 52 52" width="56" height="56">
            <path class="checkmark" d="M14 27l7 7 17-17" />
          </svg>
        </div>
        <h1 class="mb-2" style="font-size:28px;">Account confirmed</h1>
        <p class="mb-4" style="color:var(--p2p-text-soft); font-size:15px;">
          Your account has been verified successfully. You're all set to start reducing food waste.
        </p>
        <a href="login" class="p2p-btn w-100">Continue to sign in <i class="bi bi-arrow-right"></i></a>
      </div>
    </div>

    <script src="js/p2p.js"></script>
  </body>
</html>
