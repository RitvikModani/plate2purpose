<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Phone Login | Plate2Purpose</title>
    <link rel="icon" type="image/svg+xml" href="images/p2p-mark.svg" />
    <link rel="icon" href="images/recycle-sign.png" type="image/png" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Sign in to Plate2Purpose with your phone number via one-time password." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/bootstrap-icons.css" rel="stylesheet" />
    <link href="css/p2p.css" rel="stylesheet" />

    <style>
      .p2p-auth-wrap {
        min-height: 100vh;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        padding: 40px 18px;
      }
      .p2p-auth-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: var(--p2p-font-display);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: -0.02em;
        color: var(--p2p-text);
        text-decoration: none;
      }
      .p2p-auth-brand:hover { color: var(--p2p-green); }
      .p2p-auth-card {
        width: 100%;
        max-width: 420px;
        text-align: center;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Fraunces:ital,opsz,wght@1,9..144,500;1,9..144,600&display=swap" rel="stylesheet" />
</head>
  <body class="p2p">
    <!-- Preloader -->
    <div class="p2p-preloader">
      <div class="ring"></div>
      <div class="word">Plate2Purpose</div>
    </div>

    <div class="p2p-auth-wrap">
      <a href="index" class="p2p-auth-brand" data-reveal="down">
        <span class="p2p-logo-mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3a9 9 0 1 0 9 9" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <path d="M21 5c-4 .5-6.5 2-8.5 5.5" stroke="#d9f99d" stroke-width="2" stroke-linecap="round"/>
            <path d="M21 5c-.2 2.2-1 3.8-2.6 5" stroke="#d9f99d" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        Plate2Purpose<sup style="font-size:10px; opacity:.5; margin-left:2px;">™</sup>
      </a>

      <div class="p2p-form-card p2p-auth-card" data-reveal="up">
        <div class="p2p-icon-chip"><i class="bi bi-phone"></i></div>
        <h2 class="mb-2" style="font-size:28px;">Phone sign-in</h2>
        <p class="mb-4" style="color:var(--p2p-text-soft); font-size:14.5px;">
          We'll text you a one-time code to verify it's you.
        </p>

        <input
          type="tel"
          id="phoneNumber"
          class="form-control mb-3"
          placeholder="+91XXXXXXXXXX"
          required
        />
        <button onclick="sendOtp()" class="p2p-btn w-100 mb-3">Send OTP <i class="bi bi-send"></i></button>

        <div id="otpSection" style="display: none">
          <input
            type="text"
            id="otpCode"
            class="form-control mb-3"
            placeholder="Enter OTP"
          />
          <button onclick="verifyOtp()" class="p2p-btn w-100">Verify OTP <i class="bi bi-check2-circle"></i></button>
        </div>

        <a href="login" class="d-inline-block mt-4" style="color:var(--p2p-green); font-weight:500; font-size:14px; text-decoration:none;">
          <i class="bi bi-arrow-left"></i> Back to main login
        </a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
      const client = supabase.createClient(
        "https://pljmachiuahkrkiddehc.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBsam1hY2hpdWFoa3JraWRkZWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTExMTAyNDEsImV4cCI6MjA2NjY4NjI0MX0.ke4EYw5lGX5DHrgu1GCDxRUbMYU-M6KzbLZVeesoVm8"
      );

      async function sendOtp() {
        const phone = document.getElementById("phoneNumber").value.trim();
        if (!phone.startsWith("+")) {
          alert("❌ Use international format (e.g. +91...)");
          return;
        }

        const { error } = await client.auth.signInWithOtp({ phone });
        if (error) return alert("❌ " + error.message);

        alert("✅ OTP Sent!");
        document.getElementById("otpSection").style.display = "block";
      }

      async function verifyOtp() {
        const phone = document.getElementById("phoneNumber").value.trim();
        const token = document.getElementById("otpCode").value.trim();

        const { error } = await client.auth.verifyOtp({
          phone,
          token,
          type: "sms",
        });

        if (error) return alert("❌ " + error.message);

        localStorage.setItem("username", phone);
        window.location.href = "dashboard";
      }
    </script>

    <script src="js/p2p.js"></script>
  </body>
</html>
